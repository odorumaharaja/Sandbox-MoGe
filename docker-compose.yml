services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moge-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./hf_cache:/app/hf_cache
      - ./backend:/app/backend
      - ./assets:/app/assets
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: ["uv", "run", "python", "-m", "backend.main"]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moge-frontend
    ports:
      - "7860:7860"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app/frontend
    command: ["uv", "run", "python", "frontend/app.py"]
